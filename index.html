<!DOCTYPE html>
<html>
<head>
    <title>NASDAQ Stock Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 NASDAQ Stock Tracker</h1>

<div class="search-box">
    <input type="text" id="stock" placeholder="Search stock..." onkeyup="showSuggestions()">

</div>

<button onclick="getStock()">Search</button>

<h2 id="price"></h2>
<h3 id="change"></h3>
<h3 id="change7"></h3>

<canvas id="chart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
